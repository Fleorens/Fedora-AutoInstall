# /etc/fedora43-gaming/fedora43-gaming.conf
# Template - Fedora 43 KDE Gaming

# Logging directory (required)
LOG_DIR="/var/log/fedora43-gaming"

# Flatpak scope: system recommended
FLATPAK_SCOPE="system"   # system|user

# ---------- Kernel strategy ----------
# Default: install latest kernel available from enabled repos
KERNEL_MODE="latest"     # latest|pin
KERNEL_CHANNEL="stable"  # stable|testing
TARGET_KERNEL_NVR="6.18.10-200.fc43"   # used only when KERNEL_MODE=pin
ALLOW_UPDATES_TESTING="true"           # allow temporary enable to fetch pinned NVR
KERNEL_VERSIONLOCK="false"             # lock kernel packages after install

# ---------- Version validation ----------
# Default: do not enforce exact versions, just log them.
VERIFY_ENFORCE="false"   # false => log + warn only; true => fail on mismatch
# Optional expectations (can be left empty in dynamic mode)
EXPECTED_PLASMA="6.6.0"
EXPECTED_KF6="6.23.0"
EXPECTED_QT="6.10.1"
EXPECTED_KERNEL_FULL="6.18.10-200.fc43.x86_64"

# ---------- Gaming/system tweaks ----------
TUNED_PROFILE="balanced"       # balanced|desktop|latency-performance|...
ENABLE_FSTRIM_TIMER="true"
ENABLE_ZRAM_TWEAKS="true"
ZRAM_SIZE_EXPR="ram / 4"       # zram-generator expression
VM_SWAPPINESS="10"

ENABLE_SDDM_WAYLAND="true"

# Optional kernel cmdline tweaks (OFF by default; unsafe to force globally)
ENABLE_KERNEL_CMDLINE_TWEAKS="false"
KERNEL_CMDLINE_ARGS="mem_sleep_default=s2idle amdgpu.gpu_recovery=1 pcie_aspm=off"

# Force steps re-apply if needed
FORCE_REAPPLY="false"
